<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Asbir Tech</title>
    <meta
      name="description"
      content="Asbir Tech is a web development and IT consulting agency helping businesses scale, transform, and gain a competitive edge through modern digital solutions."
    />
    <meta name="theme-color" content="#000000" />
    <link rel="canonical" href="https://asbirtech.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://asbirtech.com/" />
    <meta property="og:title" content="Asbir Tech — Web Development & IT Consulting" />
    <meta
      property="og:description"
      content="Modern web development and IT consulting for businesses who want to scale smarter. Based in Australia & the Philippines."
    />
    <meta property="og:image" content="https://asbirtech.com/favicon.png" />
    <meta property="og:site_name" content="Asbir Tech" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Asbir Tech — Web Development & IT Consulting" />
    <meta
      name="twitter:description"
      content="Modern web development and IT consulting for businesses who want to scale smarter."
    />
    <meta name="twitter:image" content="https://asbirtech.com/favicon.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Asbir Tech",
        "url": "https://asbirtech.com",
        "logo": "https://asbirtech.com/favicon.png",
        "description": "Web development and IT consulting agency established in 2016.",
        "foundingDate": "2016",
        "areaServed": ["AU", "PH"],
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer service",
          "url": "https://asbirtech.com/#contact"
        }
      }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap"
      rel="stylesheet"
    />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
